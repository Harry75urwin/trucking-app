services:
  postgres:
    image: postgres:16-alpine
    container_name: truck-app-postgres
    environment:
      POSTGRES_DB: truckapp
      POSTGRES_USER: truckuser
      POSTGRES_PASSWORD: truckpass
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: